name: fitness-app
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: fitness-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - sqlite_data:/app/data
    restart: always
    networks:
      - default
      - docker-app-stack_app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite_data:
    driver: local

networks:
  docker-app-stack_app-network:
    external: true
